# Legacy CI configuration - see comprehensive-testing.yml for full test suite
name: Quick Tests (Legacy)

on:
  push:
    branches: [ main, develop, v0.2.0 ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Quick validation for fast feedback
  quick-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.8", "3.10", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: 'pyproject.toml'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run core tests with coverage
      run: |
        python -m pytest tests/test_all_parsers.py tests/test_core_interfaces.py \
          -v --cov=preprimer --cov-report=xml --tb=short

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.10'
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  # Basic code quality checks
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip'
        cache-dependency-path: 'pyproject.toml'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run black
      run: |
        black --check --diff preprimer/ tests/ examples/ scripts/

    - name: Run isort
      run: |
        isort --check-only --diff preprimer/ tests/ examples/ scripts/

    - name: Run flake8
      run: |
        flake8 preprimer/ tests/ examples/ scripts/ --max-line-length=88 --extend-ignore=E203,W503

    - name: Run mypy
      run: |
        mypy preprimer/ --ignore-missing-imports --no-strict-optional
