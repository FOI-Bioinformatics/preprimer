name: CI

on:
  push:
    branches: [main, develop, "v*"]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Code quality (one matrix entry only)
        if: matrix.python-version == '3.12' && matrix.os == 'ubuntu-latest'
        run: |
          black --check preprimer/ tests/
          isort --check-only preprimer/ tests/
          # Errors (real bugs) must pass; style warnings are reported but
          # non-blocking, per the documented "warnings OK, errors not OK" policy.
          flake8 preprimer/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 preprimer/ tests/ --count --exit-zero --max-line-length=88 --extend-ignore=E203,W503 --statistics
