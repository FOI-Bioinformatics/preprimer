name: CI

on:
  push:
    branches: [ main, develop, v0.2.0 ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run tests with coverage
      run: |
        python -m pytest tests/ --cov=preprimer --cov-report=xml --cov-report=term -v

    - name: Upload coverage
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Check formatting
      run: black --check preprimer/ tests/

    - name: Check imports
      run: isort --check-only preprimer/ tests/

    - name: Lint
      run: flake8 preprimer/ tests/ --max-line-length=88 --extend-ignore=E203,W503

    - name: Type check
      run: mypy preprimer/ --ignore-missing-imports

    - name: Security check
      run: |
        pip install bandit safety
        bandit -r preprimer/ -ll
        safety check || true
